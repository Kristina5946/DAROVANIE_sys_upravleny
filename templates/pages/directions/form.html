{% extends 'base.html' %}
{% load static %}

{% block title %}Новое направление{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/pages/entities.css' %}">{% endblock %}

{% block content %}
<div class="page-actions">
    <a href="{% url 'core:direction_list' %}" class="btn btn--ghost">← К списку</a>
</div>
<div class="panel panel--form">
    <h2 class="panel__title">Новое направление</h2>
    <form method="post" class="entity-form">
        {% csrf_token %}
        <div class="form-grid form-grid--compact">
            {% for field in form %}
            <div class="field {% if field.name == 'description' %}form-section--full{% endif %}">
                <label>{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Создать</button>
        </div>
    </form>
</div>
{% endblock %}
