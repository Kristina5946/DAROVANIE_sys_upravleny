{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div style="text-align:center;margin-bottom:1.5rem">
            <div class="sidebar__logo" style="margin:0 auto 0.75rem;width:52px;height:52px;font-size:1.4rem">Д</div>
            <p class="text-muted" style="margin:0;font-size:0.9rem">Центр развития талантов</p>
        </div>
        <h1>Вход в систему</h1>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger">Неверное имя пользователя или пароль.</div>
            {% endif %}
            <div class="form-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn btn--primary btn--block">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
